<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Tailwind & DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font     -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="">

<!-- NAVBAR -->
 <header>
<div class="navbar bg-base-100 shadow px-4">

 
  <div class="flex-1 flex items-center gap-3">

    <img 
    class="w-8 h-8"
    src="/assets/github-logo.png"
    alt="GitHub Logo">

    <span class="text-lg font-semibold">
      GitHub Issues Tracker
    </span>

  </div>

  <div class="flex gap-2">

    <input 
    id="searchInput"
    type="text"
    placeholder="Search issues..."
    class="input input-bordered w-48"/>

    <button 
    onclick="searchIssue()" 
    class="btn btn-primary">
      Search
    </button>

  </div>

</div>
</header class="bg-white">
<!-- TABS -->

<div class="max-w-7xl mx-auto mt-6 bg-base-400 shadow rounded p-4">

<div class="tabs tabs-boxed w-fit">

<button id="tab-all"
class="tab tab-active"
onclick="filterIssues('all')">All</button>

<button id="tab-open"
class="tab"
onclick="filterIssues('open')">Open</button>

<button id="tab-closed"
class="tab"
onclick="filterIssues('closed')">Closed</button>

</div>




<!-- ISSUE INFO -->
 <div>

<div class="flex justify-between items-center mt-4  bg-white">

<div class="flex items-center gap-2">

<div>
    <img src="/assets/Aperture.png" alt="">
</div>

<h2 id="issueCount" class="font-semibold">Issues</h2>

</div>

<div class="flex gap-4 text-sm">

<span class="flex items-center gap-1">
<span class="w-3 h-3 bg-green-500 rounded-full"></span>
Open
</span>

<span class="flex items-center gap-1">
<span class="w-3 h-3 bg-purple-500 rounded-full"></span>
Closed
</span>

</div>

</div>














<script src="/script/app.js"></script>
</body>
