<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Tailwind & DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font     -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body class="bg-base-200 min-h-screen flex items-center justify-center">

<div class="card w-96 bg-base-100 shadow-xl">

<div class="card-body">

<div class="flex flex-col items-center gap-3">

<img src="../assets/github-logo.png" class="w-12">

<h2 class="text-xl font-semibold">GitHub Issues Tracker</h2>

<p class="text-sm text-gray-500">Sign in to manage your issues</p>

</div>

<div class="mt-4">

<label class="label">Username</label>
<input id="username" type="text" placeholder="Enter username" class="input input-bordered w-full">
<span class="label-text-alt text-primary font-medium">Default: admin</span>
<br>

<label class="label mt-3">Password</label>
<input id="password" type="password" placeholder="Enter password" class="input input-bordered w-full">
<span class="label-text-alt text-primary font-medium">Default: admin123</span>

<button onclick="login()" class="btn btn-primary w-full mt-4">
Sign In
</button>

<div class="divider">OR</div>

<div class="bg-base-200 p-3 rounded text-sm text-center">

<p class="font-semibold">Demo Credentials</p>
<p>Username: admin</p>
<p>Password: admin123</p>

</div>

</div>

</div>
</div>

<script src="/app.js"></script>

</body>

</html>
